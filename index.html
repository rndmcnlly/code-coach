<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Coach: Live Programming Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e1e1e; color: #d4d4d4;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* Top bar */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 12px; background: #252526; border-bottom: 1px solid #333;
    font-size: 13px; flex-shrink: 0;
  }
  #topbar .title { font-weight: 600; color: #569cd6; }
  #ast-status {
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    background: #333; color: #888; transition: all 0.3s;
  }
  #ast-status.editing { background: #6644; color: #ce9178; }
  #ast-status.stable { background: #2644; color: #6a9955; }
  #ast-status.error { background: #4224; color: #f44747; }
  #topbar .spacer { flex: 1; }
  #topbar button {
    background: #333; border: 1px solid #555; color: #d4d4d4;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #topbar button:hover { background: #444; }
  #topbar button.active { background: #264f78; border-color: #569cd6; }
  #topbar select {
    background: #333; border: 1px solid #555; color: #d4d4d4;
    padding: 3px 6px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }

  /* Main layout */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Editor pane (top: code, bottom: preview) */
  #editor-pane { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  #monaco-container { flex: 3; min-height: 0; }

  /* Game preview area */
  #preview-area {
    flex: 2; display: flex; flex-direction: column; min-height: 0;
    border-top: 1px solid #333;
  }
  #preview-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 10px; background: #252526; border-bottom: 1px solid #333;
    font-size: 11px; color: #666; flex-shrink: 0;
  }
  #preview-bar button {
    background: #6a9955; border: none; color: #fff;
    padding: 2px 12px; border-radius: 3px; cursor: pointer; font-size: 11px;
    font-weight: 600;
  }
  #preview-bar button:hover { background: #7fbf66; }
  #preview-bar .auto-label { color: #555; font-size: 10px; }
  #preview-bar .auto-label input { vertical-align: middle; }
  #game-iframe {
    flex: 1; border: none; background: #000; min-height: 0;
  }
  #console-area {
    max-height: 80px; overflow-y: auto; padding: 4px 10px;
    background: #1a1a1a; font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    border-top: 1px solid #333; flex-shrink: 0;
  }
  #console-area:empty { display: none; }
  .console-line { padding: 1px 0; color: #888; }
  .console-line.error { color: #f44747; }
  .console-line.warn { color: #ce9178; }

  /* Coach pane (narrow log sidebar) */
  #coach-pane {
    width: 280px; display: flex; flex-direction: column;
    border-left: 1px solid #333; background: #1a1a1a;
    opacity: 0.85;
  }
  #coach-header {
    padding: 4px 10px; background: #252526; border-bottom: 1px solid #333;
    font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #chat-log {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    padding: 4px 8px; border-radius: 4px; font-size: 11px;
    line-height: 1.4; max-width: 100%; word-wrap: break-word;
  }
  .msg.coach {
    background: #264f7844; color: #aaa; align-self: flex-start;
    border-left: 2px solid #569cd644;
  }
  .msg.user {
    background: #33333344; color: #aaa; align-self: flex-end;
    border-right: 2px solid #6a995544;
  }
  .msg.system {
    background: transparent; color: #555; align-self: center;
    font-style: italic; font-size: 10px; text-align: center;
  }
  .msg.coach .label { font-size: 9px; color: #569cd666; margin-bottom: 1px; }
  .msg.user .label { font-size: 9px; color: #6a995566; margin-bottom: 1px; text-align: right; }
  .msg.context {
    background: #1a1a2e; color: #666; align-self: stretch;
    font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    border-left: 3px solid #444; padding: 0;
  }
  .msg.context summary {
    padding: 5px 8px; cursor: pointer; color: #888;
    font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px;
  }
  .msg.context summary:hover { color: #aaa; }
  .msg.context pre {
    margin: 0; padding: 6px 8px; white-space: pre-wrap;
    word-break: break-all; max-height: 200px; overflow-y: auto;
    border-top: 1px solid #333;
  }
  .msg.context .ctx-badge {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 10px; margin-right: 4px;
  }
  .msg.context .ctx-badge.ok { background: #1a3a1a; color: #6a9955; }
  .msg.context .ctx-badge.err { background: #3a1a1a; color: #f44747; }

  /* Input area (below editor) */
  #input-area {
    display: flex; gap: 6px; padding: 6px 12px; align-items: center;
    border-top: 1px solid #333; background: #252526; flex-shrink: 0;
  }
  #selection-hint {
    font-size: 11px; color: #569cd6; white-space: nowrap;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  }
  #selection-hint:empty { display: none; }
  #user-input {
    flex: 1; background: #333; border: 1px solid #555; color: #d4d4d4;
    padding: 6px 10px; border-radius: 4px; font-size: 13px;
    font-family: inherit; resize: none;
  }
  #user-input::placeholder { color: #555; }
  #send-btn, #mic-btn {
    background: #333; border: 1px solid #555; color: #d4d4d4;
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  #send-btn:hover, #mic-btn:hover { background: #444; }
  #mic-btn.listening { background: #6b2020; border-color: #f44747; color: #f44747; }

  /* Fullscreen caption overlay */
  #caption-overlay {
    display: none; position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%); max-width: 70%; padding: 12px 20px;
    background: rgba(0,0,0,0.85); color: #fff; font-size: 18px;
    border-radius: 8px; text-align: center; z-index: 9999;
    pointer-events: none; line-height: 1.4;
  }
  #caption-overlay.visible { display: block; }

  /* Particle canvas overlay */
  #particle-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9998;
  }

  /* Quick-fix widget (inline in editor) */
  .coach-quickfix {
    display: inline-flex; align-items: center; gap: 6px;
    background: #2d2a1a; border: 1px solid #ce917844;
    border-radius: 4px; padding: 2px 8px; font-size: 12px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #ce9178; white-space: nowrap;
  }
  .coach-quickfix .qf-msg { max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  .coach-quickfix button {
    border: none; border-radius: 3px; padding: 1px 8px;
    font-size: 11px; cursor: pointer;
  }
  .coach-quickfix .qf-apply { background: #6a9955; color: #fff; }
  .coach-quickfix .qf-apply:hover { background: #7fbf66; }
  .coach-quickfix .qf-dismiss {
    background: transparent; color: #888; border: 1px solid #555;
  }
  .coach-quickfix .qf-dismiss:hover { background: #333; color: #ccc; }

  /* Todo pane (middle panel) */
  #todo-pane {
    width: 200px; display: flex; flex-direction: column;
    border-left: 1px solid #333; background: #1e1e1e;
  }
  #todo-header {
    padding: 4px 10px; background: #252526; border-bottom: 1px solid #333;
    font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #todo-header .todo-count {
    background: #569cd633; color: #569cd6; padding: 0 5px;
    border-radius: 8px; font-size: 10px; margin-left: 4px;
  }
  #todo-items {
    flex: 1; overflow-y: auto; padding: 6px 10px;
  }
  #todo-items:empty::after {
    content: 'Coach will add tasks as you code.';
    color: #444; font-style: italic; font-size: 11px;
  }
  .todo-item {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 3px 0; color: #aaa; line-height: 1.4; font-size: 12px;
  }
  .todo-item.done { color: #555; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-item .todo-check {
    width: 14px; height: 14px; border: 1px solid #555;
    border-radius: 3px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; font-size: 10px;
    margin-top: 1px;
  }
  .todo-item.done .todo-check {
    background: #6a995533; border-color: #6a9955; color: #6a9955;
  }

  /* Tool call indicator in chat */
  .msg.toolcall {
    background: #1a2a1a; color: #6a9955; align-self: stretch;
    font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace;
    border-left: 3px solid #6a9955; padding: 4px 8px;
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="title">Code Coach</span>
  <span id="ast-status">Initializing...</span>
  <span class="spacer"></span>
  <button id="topbar-run-btn" style="background:#6a9955;border-color:#6a9955;color:#fff" title="Run (Ctrl+Enter)">&#9654; Run</button>
  <select id="tts-select" title="Text-to-speech mode">
    <option value="off">Voice: Off</option>

  <button id="sfx-btn" title="Toggle sound effects">SFX: On</button>

  <div id="editor-pane">
    <div id="monaco-container"></div>
    <div id="input-area">
      <span id="selection-hint"></span>
      <textarea id="user-input" rows="1" placeholder="Select code and ask about it, or just type... (Enter to send)"></textarea>

    <div id="preview-area">

        <button id="run-btn" title="Run code in preview (Ctrl+Enter)">Run</button>

</div>

<div id="caption-overlay"></div>
<canvas id="particle-canvas"></canvas>

<!-- Monaco Editor from CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

<!-- Tree-sitter: load pre-built UMD from unpkg -->
<script src="https://unpkg.com/web-tree-sitter@0.24.7/tree-sitter.js"></script>

<!-- All component definitions + boot orchestrator -->
<script type="module">
import { marked } from "https://esm.run/marked";

// =========================================================================
// Shared utility
// =========================================================================
function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// Make marked available to components that need it
window.__marked = marked;
window.__escapeHtml = escapeHtml;

// =========================================================================
// <code-editor> : Monaco editor + decorations + annotations + quick-fix
//
// Methods:
//   getValue()                      – current source text
//   getPosition()                   – {lineNumber, column}
//   getSelection()                  – Monaco Selection or null
//   getLineContent(n)               – text of line n
//   getLineCount()                  – total lines
//   editCode({startLine, endLine, newText})
//   highlightLines({startLine, endLine, message, linkUrl?, linkLabel?})
//   clearHighlights()
//   getCode()                       – numbered source for LLM context
//   suggestFix({line, oldText, newText, message})
//   getLineScreenPos(lineNumber)    – {x,y} in viewport coords
// Events dispatched on document:
//   "code-changed"                  – detail: { code }
//   "selection-changed"             – detail: { startLine, endLine, text } | null
//   "annotation-dismissed"          – detail: { startLine, endLine, message }
//   "quickfix-applied"              – detail: { line, message }
//   "quickfix-dismissed"            – detail: { line, message }
// =========================================================================

const STARTER_CODE = `// Welcome to Code Coach!
// Start building your Phaser 4 game here.
// The coach will react as you code.

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  scene: {
    preload: preload,
    create: create,
    update: update
  }
};

const game = new Phaser.Game(config);

function preload() {
  // Load your assets here
}

function create() {
  // Set up your game objects here
}

function update() {
  // Game loop logic here
}
`;

class CodeEditor extends HTMLElement {
  #editor = null;
  #activeDecorations = [];
  #annotationStyleEl = null;
  #activeAnnotation = null;
  #activeQuickFix = null;
  #initResolve = null;
  #initPromise = null;

  constructor() {
    super();
    this.#initPromise = new Promise(r => { this.#initResolve = r; });
  }

  /** Resolves when Monaco is loaded and editor is ready. */
  get ready() { return this.#initPromise; }

  connectedCallback() {
    this.#initMonaco();
  }

  // ---- Public API ----

  getValue() { return this.#editor?.getValue() ?? ""; }
  getPosition() { return this.#editor?.getPosition(); }
  getLineCount() { return this.#editor?.getModel()?.getLineCount() ?? 0; }
  getLineContent(n) { return this.#editor?.getModel()?.getLineContent(n) ?? ""; }

  getSelection() {
    if (!this.#editor) return null;
    const sel = this.#editor.getSelection();
    if (!sel || sel.isEmpty()) return null;
    const text = this.#editor.getModel().getValueInRange(sel);
    return { startLine: sel.startLineNumber, endLine: sel.endLineNumber, text };
  }

  /** Get numbered source code for LLM context. */
  getCode() {
    if (!this.#editor) return { error: "Editor not ready" };
    const code = this.#editor.getValue();
    const numbered = code.split("\n").map((line, i) => `${i + 1}: ${line}`).join("\n");
    return { code: numbered, lineCount: this.#editor.getModel().getLineCount(), note: "Line numbers are 1-indexed." };
  }

  editCode({ startLine, endLine, newText }) {
    if (!this.#editor) return { error: "Editor not ready" };
    const model = this.#editor.getModel();
    const totalLines = model.getLineCount();
    startLine = Math.max(1, Math.min(startLine, totalLines));
    endLine = Math.max(startLine, Math.min(endLine, totalLines));
    const range = new monaco.Range(startLine, 1, endLine, model.getLineMaxColumn(endLine));
    this.#editor.executeEdits("code-coach", [{ range, text: newText, forceMoveMarkers: true }]);
    return { success: true, linesAffected: `${startLine}-${endLine}`, newLineCount: model.getLineCount() };
  }

  highlightLines({ startLine, endLine, message, linkUrl, linkLabel }) {
    if (!this.#editor) return { error: "Editor not ready" };
    this.clearHighlights();

    const model = this.#editor.getModel();
    const totalLines = model.getLineCount();
    startLine = Math.max(1, Math.min(startLine, totalLines));
    endLine = Math.max(startLine, Math.min(endLine, totalLines));

    let hoverMessage = message;
    if (linkUrl) hoverMessage += `\n\n[${linkLabel || "docs"}](${linkUrl})`;

    let afterText = `  \u25B8 ${message}`;
    if (linkUrl) afterText += ` (${linkLabel || "docs"})`;
    const cssContent = afterText.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\n/g, " ");

    if (this.#annotationStyleEl) this.#annotationStyleEl.remove();
    this.#annotationStyleEl = document.createElement("style");
    this.#annotationStyleEl.textContent = `
      .coach-inline-annotation::after {
        content: '${cssContent}';
        color: #569cd6aa; font-style: italic; margin-left: 1.5em;
        font-size: 0.85em; pointer-events: none;
      }
    `;
    document.head.appendChild(this.#annotationStyleEl);

    this.#activeDecorations = this.#editor.deltaDecorations([], [
      {
        range: new monaco.Range(startLine, 1, endLine, 1),
        options: {
          isWholeLine: true,
          className: "coach-highlight-line",
          glyphMarginClassName: "coach-glyph",
          hoverMessage: { value: hoverMessage, isTrusted: true },
        }
      },
      {
        range: new monaco.Range(startLine, 1, startLine, model.getLineMaxColumn(startLine)),
        options: { afterContentClassName: "coach-inline-annotation" }
      }
    ]);

    this.#activeAnnotation = { startLine, endLine, message };
    this.#editor.revealLineInCenterIfOutsideViewport(startLine);

    // Particles at annotation
    requestAnimationFrame(() => {
      const pos = this.getLineScreenPos(startLine);
      if (pos) document.dispatchEvent(new CustomEvent("particles-spawn", { detail: pos }));
    });

    return { success: true, highlighted: `lines ${startLine}-${endLine}` };
  }

  clearHighlights() {
    if (!this.#editor) return { error: "Editor not ready" };
    if (this.#activeDecorations.length) {
      this.#activeDecorations = this.#editor.deltaDecorations(this.#activeDecorations, []);
    }
    if (this.#annotationStyleEl) { this.#annotationStyleEl.remove(); this.#annotationStyleEl = null; }
    this.#activeAnnotation = null;
    return { success: true };
  }

  suggestFix({ line, oldText, newText, message }) {
    if (!this.#editor) return { error: "Editor not ready" };
    this.#clearQuickFix();

    const model = this.#editor.getModel();
    const totalLines = model.getLineCount();
    line = Math.max(1, Math.min(line, totalLines));
    const lineContent = model.getLineContent(line);
    if (!lineContent.includes(oldText)) return { error: `"${oldText}" not found on line ${line}` };

    const decorations = this.#editor.deltaDecorations([], [{
      range: new monaco.Range(line, 1, line, 1),
      options: { isWholeLine: true, className: "coach-highlight-line" }
    }]);

    const widgetId = `coach-quickfix-${Date.now()}`;
    const esc = window.__escapeHtml;
    const widget = {
      getId: () => widgetId,
      getDomNode: () => {
        const node = document.createElement("div");
        node.className = "coach-quickfix";
        node.innerHTML = `
          <span class="qf-msg">${esc(message)}</span>
          <button class="qf-apply">Apply</button>
          <button class="qf-dismiss">Dismiss</button>
        `;
        node.querySelector(".qf-apply").addEventListener("click", () => this.#applyQuickFix());
        node.querySelector(".qf-dismiss").addEventListener("click", () => this.#dismissQuickFix());
        return node;
      },
      getPosition: () => ({
        position: { lineNumber: line, column: model.getLineMaxColumn(line) },
        preference: [monaco.editor.ContentWidgetPositionPreference.EXACT]
      })
    };

    this.#editor.addContentWidget(widget);
    this.#editor.revealLineInCenterIfOutsideViewport(line);
    this.#activeQuickFix = { widget, line, oldText, newText, message, decorations };
    return { success: true, line, message: `Quick-fix offered on line ${line}. Waiting for student.` };
  }

  getLineScreenPos(lineNumber) {
    if (!this.#editor) return null;
    const topPos = this.#editor.getScrolledVisiblePosition({ lineNumber, column: 1 });
    if (!topPos) return null;
    const rect = this.#editor.getDomNode()?.getBoundingClientRect();
    if (!rect) return null;
    return { x: rect.left + topPos.left + 40, y: rect.top + topPos.top + 10 };
  }

  // ---- Private ----

  #applyQuickFix() {
    if (!this.#activeQuickFix) return;
    const { line, oldText, newText, message } = this.#activeQuickFix;
    const model = this.#editor.getModel();
    const lineContent = model.getLineContent(line);
    const col = lineContent.indexOf(oldText);
    if (col === -1) {
      this.#clearQuickFix();
      document.dispatchEvent(new CustomEvent("quickfix-applied", {
        detail: { line, message, error: `text no longer found on line ${line}` }
      }));
      return;
    }
    const range = new monaco.Range(line, col + 1, line, col + 1 + oldText.length);
    this.#editor.executeEdits("code-coach-quickfix", [{ range, text: newText, forceMoveMarkers: true }]);
    this.#clearQuickFix();
    document.dispatchEvent(new CustomEvent("quickfix-applied", { detail: { line, message } }));
  }

  #dismissQuickFix() {
    if (!this.#activeQuickFix) return;
    const { line, message } = this.#activeQuickFix;
    this.#clearQuickFix();
    document.dispatchEvent(new CustomEvent("quickfix-dismissed", { detail: { line, message } }));
  }

  #clearQuickFix() {
    if (!this.#activeQuickFix) return;
    this.#editor.removeContentWidget(this.#activeQuickFix.widget);
    if (this.#activeQuickFix.decorations.length) {
      this.#editor.deltaDecorations(this.#activeQuickFix.decorations, []);
    }
    this.#activeQuickFix = null;
  }

  #dismissAnnotation() {
    if (!this.#activeAnnotation) return;
    const dismissed = { ...this.#activeAnnotation };
    this.clearHighlights();
    document.dispatchEvent(new CustomEvent("annotation-dismissed", { detail: dismissed }));
  }

  #initMonaco() {
    require.config({
      paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs" }
    });
    require(["vs/editor/editor.main"], () => {
      this.#editor = monaco.editor.create(document.getElementById("monaco-container"), {
        value: STARTER_CODE,
        language: "javascript",
        theme: "vs-dark",
        fontSize: 14,
        minimap: { enabled: false },
        automaticLayout: true,
        wordWrap: "on",
        lineNumbers: "on",
        scrollBeyondLastLine: false,
        tabSize: 2,
        glyphMargin: true,
      });

      // Selection changes
      this.#editor.onDidChangeCursorSelection(() => {
        const sel = this.getSelection();
        document.dispatchEvent(new CustomEvent("selection-changed", { detail: sel }));
      });

      // Glyph margin click to dismiss annotation
      this.#editor.onMouseDown((e) => {
        if (e.target.type === monaco.editor.MouseTargetType.GUTTER_GLYPH_MARGIN && this.#activeAnnotation) {
          const clickedLine = e.target.position?.lineNumber;
          if (clickedLine && clickedLine >= this.#activeAnnotation.startLine && clickedLine <= this.#activeAnnotation.endLine) {
            this.#dismissAnnotation();
          }
        }
      });

      // Inject decoration styles
      const styleEl = document.createElement("style");
      styleEl.textContent = `
        .coach-highlight-line { background: rgba(86, 156, 214, 0.15) !important; }
        .coach-glyph { cursor: pointer !important; }
        .coach-glyph::before {
          content: '\\2715'; color: #569cd688; font-size: 12px;
          line-height: 19px; display: block; text-align: center;
        }
        .coach-glyph:hover::before { color: #f44747; }
      `;
      document.head.appendChild(styleEl);

      this.#initResolve();
    });
  }
}

// =========================================================================
// <ast-watcher> : Tree-sitter parsing, polling, stability detection, diff
//
// Attributes: poll-ms, stability-threshold, debounce-ms
// Requires: a <code-editor> element (passed via setEditor())
// Methods:
//   async init()                – load tree-sitter WASM
//   setEditor(codeEditor)      – bind to a CodeEditor instance
//   startPolling()
//   getLastCoachedCode()       – for resetting after edits
// Events dispatched on document:
//   "ast-status"               – detail: { cls, text }
//   "code-context"             – detail: { message, hasErrors } (ready to send to agent)
// =========================================================================
class AstWatcher extends HTMLElement {
  #parser = null;
  #language = null;
  #ready = false;
  #editor = null;

  #lastCode = "";
  #lastASTSexp = "";
  #lastCoachedSexp = "";
  #lastCoachedCode = "";
  #stableCount = 0;
  #lastCoachTime = 0;
  #coachResponding = false;

  #pollMs = 1000;
  #stabilityThreshold = 2;
  #debounceMs = 4000;

  connectedCallback() {
    this.#pollMs = parseInt(this.getAttribute("poll-ms")) || 1000;
    this.#stabilityThreshold = parseInt(this.getAttribute("stability-threshold")) || 2;
    this.#debounceMs = parseInt(this.getAttribute("debounce-ms")) || 4000;

    // Listen for agent response to track timing
    document.addEventListener("agent-response", () => {
      this.#lastCoachTime = Date.now();
      this.#coachResponding = false;
    });
    document.addEventListener("agent-error", () => {
      this.#coachResponding = false;
    });
  }

  setEditor(editor) { this.#editor = editor; }
  setCoachResponding(v) { this.#coachResponding = v; }
  get lastCoachedCode() { return this.#lastCoachedCode; }

  /** Reset tracking state after an external edit (e.g. tool edit_code). */
  resetTracking() {
    if (!this.#editor) return;
    this.#lastCode = this.#editor.getValue();
    this.#stableCount = 0;
  }

  async init() {
    const Parser = window.TreeSitter;
    await Parser.init({
      locateFile(scriptName) {
        return `https://unpkg.com/web-tree-sitter@0.24.7/${scriptName}`;
      },
    });
    this.#parser = new Parser();
    this.#language = await Parser.Language.load(
      "https://unpkg.com/tree-sitter-javascript@0.23.1/tree-sitter-javascript.wasm"
    );
    this.#parser.setLanguage(this.#language);
    this.#ready = true;
    this.#setStatus("stable", "Ready");
  }

  startPolling() {
    if (!this.#editor) return;
    this.#lastCode = this.#editor.getValue();

    // Set baseline AST
    const tree = this.#parser.parse(this.#lastCode);
    if (tree) {
      this.#lastASTSexp = tree.rootNode.toString();
      this.#lastCoachedSexp = this.#lastASTSexp;
      this.#lastCoachedCode = this.#lastCode;
    }

    setInterval(() => this.#tick(), this.#pollMs);
  }

  #tick() {
    if (!this.#ready || !this.#editor) return;
    const code = this.#editor.getValue();

    if (code === this.#lastCode) {
      if (this.#stableCount < this.#stabilityThreshold) this.#stableCount++;
      if (this.#stableCount < this.#stabilityThreshold) {
        this.#setStatus("editing", `Settling... (${this.#stableCount}/${this.#stabilityThreshold})`);
      }
      if (this.#stableCount === this.#stabilityThreshold && !this.#coachResponding) {
        const tree = this.#parser.parse(code);
        if (tree) {
          const sexp = tree.rootNode.toString();
          const hasErrors = tree.rootNode.hasError;
          if (hasErrors) {
            this.#setStatus("error", "Syntax error");
            this.#maybeCoach(code, sexp, true);
          } else if (sexp !== this.#lastCoachedSexp) {
            this.#setStatus("stable", "Stable \u2014 sending to coach");
            this.#maybeCoach(code, sexp, false);
          } else if (code !== this.#lastCoachedCode) {
            this.#setStatus("stable", "Stable \u2014 text change (rename?)");
            this.#maybeCoach(code, sexp, false);
          } else {
            this.#setStatus("stable", "Stable \u2014 no new changes");
          }
          this.#lastASTSexp = sexp;
        }
      }
    } else {
      this.#lastCode = code;
      this.#stableCount = 0;
      this.#setStatus("editing", "Editing...");
    }
  }

  #maybeCoach(code, currentSexp, hasErrors) {
    const now = Date.now();
    if (now - this.#lastCoachTime < this.#debounceMs) return;
    if (this.#coachResponding) return;

    const diff = this.#computeDiff(this.#lastCoachedSexp, currentSexp);
    const isTextOnly = (diff === "No structural changes." && code !== this.#lastCoachedCode);
    if (diff === "No structural changes." && !isTextOnly && !hasErrors) return;

    this.#lastCoachedSexp = currentSexp;
    this.#lastCoachedCode = code;
    this.#coachResponding = true;

    const pos = this.#editor.getPosition();
    const cursorLine = pos ? pos.lineNumber : "unknown";
    const cursorContent = pos ? this.#editor.getLineContent(pos.lineNumber) : "";

    let message = `[Code update]\n`;
    message += `Cursor: line ${cursorLine} (content: ${cursorContent.trim()})\n`;

    if (hasErrors) {
      const tree = this.#parser.parse(code);
      const errors = [];
      const findErrors = (node) => {
        if (node.type === "ERROR" || node.isMissing) {
          errors.push(`Line ${node.startPosition.row + 1}, col ${node.startPosition.column}: ${node.type}${node.isMissing ? " (missing)" : ""}`);
        }
        for (let i = 0; i < node.childCount; i++) findErrors(node.child(i));
      };
      findErrors(tree.rootNode);
      message += `Parse status: SYNTAX ERROR\nErrors: ${errors.join("; ") || "unknown location"}\n`;
    } else {
      message += `Parse status: OK\n`;
    }

    if (isTextOnly) {
      message += `AST diff: Structure unchanged, but identifiers or literals were renamed/edited. Check naming.\n`;
    } else {
      message += `AST diff: ${diff}\n`;
    }

    const numbered = code.split("\n").map((line, i) => `${i + 1}: ${line}`).join("\n");
    message += `\nCurrent code (with 1-indexed line numbers):\n\`\`\`\n${numbered}\n\`\`\``;

    document.dispatchEvent(new CustomEvent("code-context", { detail: { message, hasErrors } }));
  }

  #computeDiff(oldSexp, newSexp) {
    if (!oldSexp) return "Initial code snapshot (no previous state to diff against).";
    if (oldSexp === newSexp) return "No structural changes.";

    const extract = (sexp) => {
      const forms = [];
      let depth = 0, start = -1;
      for (let i = 0; i < sexp.length; i++) {
        if (sexp[i] === "(") { if (depth === 1) start = i; depth++; }
        else if (sexp[i] === ")") { depth--; if (depth === 1 && start >= 0) { forms.push(sexp.slice(start, i + 1)); start = -1; } }
      }
      return forms;
    };

    const oldForms = new Set(extract(oldSexp));
    const newForms = new Set(extract(newSexp));
    const added = [...newForms].filter(f => !oldForms.has(f));
    const removed = [...oldForms].filter(f => !newForms.has(f));
    const parts = [];
    if (added.length) parts.push(`Added ${added.length} AST node(s): ${added.map(f => f.slice(0, 120)).join("; ")}`);
    if (removed.length) parts.push(`Removed ${removed.length} AST node(s): ${removed.map(f => f.slice(0, 120)).join("; ")}`);
    if (!parts.length) parts.push("Minor structural changes detected (internal modifications to existing nodes).");
    return parts.join("\n");
  }

  #setStatus(cls, text) {
    document.dispatchEvent(new CustomEvent("ast-status", { detail: { cls, text } }));
  }
}
customElements.define("ast-watcher", AstWatcher);

// =========================================================================
// <game-preview> : iframe sandbox, console relay, screenshot capture
//
// Methods:
//   run(code)                   – load code in iframe with Phaser 4
//   async captureScreenshot()   – returns {success, base64} or {error}
//   getConsoleSnapshot()        – recent console lines as string
//   clearConsole()
// Events dispatched on document:
//   "console-line"              – detail: { level, text }
// =========================================================================
class GamePreview extends HTMLElement {
  #iframe = null;
  #consoleArea = null;
  #consoleLines = [];
  #lastScreenshotBase64 = null;

  connectedCallback() {
    this.#iframe = document.getElementById("game-iframe");
    this.#consoleArea = document.getElementById("console-area");

    // Listen for console messages from iframe
    window.addEventListener("message", (e) => {
      if (e.data?.type === "console") this.#addConsoleLine(e.data.level, e.data.text);
    });

    // Wire up buttons
    document.getElementById("run-btn").addEventListener("click", () => this.runFromEditor());
    document.getElementById("topbar-run-btn").addEventListener("click", () => this.runFromEditor());
    document.getElementById("clear-console-btn").addEventListener("click", () => this.clearConsole());
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); this.runFromEditor(); }
    });
  }

  /** Run using current editor code (needs editor reference set by orchestrator). */
  runFromEditor() {
    const editor = document.querySelector("code-editor");
    if (editor) this.run(editor.getValue());
  }

  run(code) {
    this.clearConsole();
    this.#addConsoleLine("log", "Running...");

    const html = `<!DOCTYPE html>
<html><head>
<style>* { margin: 0; padding: 0; } body { background: #000; overflow: hidden; }</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@4.0.0/dist/phaser.min.js"><\/script>
</head><body>
<script>
const _origGetContext = HTMLCanvasElement.prototype.getContext;
HTMLCanvasElement.prototype.getContext = function(type, attrs) {
  if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
    attrs = Object.assign({}, attrs, { preserveDrawingBuffer: true });
  }
  return _origGetContext.call(this, type, attrs);
};
['log','warn','error'].forEach(level => {
  const orig = console[level].bind(console);
  console[level] = (...args) => {
    orig(...args);
    try {
      parent.postMessage({ type: 'console', level, text: args.map(a => {
        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
        catch { return String(a); }
      }).join(' ') }, '*');
    } catch {}
  };
});
window.onerror = (msg, src, line, col, err) => {
  parent.postMessage({ type: 'console', level: 'error',
    text: msg + (line ? ' (line ' + line + ')' : '') }, '*');
};
window.onunhandledrejection = (e) => {
  parent.postMessage({ type: 'console', level: 'error',
    text: 'Unhandled promise rejection: ' + (e.reason?.message || e.reason) }, '*');
};
<\/script>
<script>
${code}
<\/script>
</body></html>`;

    this.#iframe.srcdoc = html;
    return { success: true, message: "Preview running. Console output will appear." };
  }

  async captureScreenshot() {
    return new Promise((resolve) => {
      try {
        const win = this.#iframe.contentWindow;
        const doc = win?.document;
        if (!doc) { resolve({ error: "No preview running. Run the code first." }); return; }
        const canvas = doc.querySelector("canvas");
        if (!canvas) { resolve({ error: "No canvas found in preview. Is Phaser running?" }); return; }

        win.requestAnimationFrame(() => {
          try {
            const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
            let base64 = dataUrl.split(",")[1];
            if (!base64 || base64.length < 500) {
              const pngUrl = canvas.toDataURL("image/png");
              base64 = pngUrl.split(",")[1];
            }
            this.#lastScreenshotBase64 = base64;
            resolve({ success: true, base64, imageSize: base64.length });
          } catch (err) {
            resolve({ error: `Screenshot failed: ${err.message}` });
          }
        });
      } catch (err) {
        resolve({ error: `Screenshot failed: ${err.message}` });
      }
    });
  }

  get lastScreenshotBase64() { return this.#lastScreenshotBase64; }

  getConsoleSnapshot() {
    if (this.#consoleLines.length === 0) return "No console output.";
    return this.#consoleLines.map(l => `[${l.level}] ${l.text}`).join("\n");
  }

  clearConsole() {
    this.#consoleLines = [];
    this.#consoleArea.innerHTML = "";
  }

  #addConsoleLine(level, text) {
    this.#consoleLines.push({ level, text });
    if (this.#consoleLines.length > 50) this.#consoleLines.shift();
    const div = document.createElement("div");
    div.className = `console-line ${level}`;
    div.textContent = `[${level}] ${text}`;
    this.#consoleArea.appendChild(div);
    this.#consoleArea.scrollTop = this.#consoleArea.scrollHeight;
  }
}
customElements.define("game-preview", GamePreview);

// =========================================================================
// <todo-list> : Task state, rendering, add/complete/remove
//
// Methods:
//   addTodo(text)          – returns {success, todos}
//   completeTodo(text)     – returns {success, completed, todos} or {error}
//   removeTodo(text)       – returns {success, removed, todos} or {error}
//   summary()              – string summary for LLM context
// =========================================================================
class TodoList extends HTMLElement {
  #todos = [];
  #itemsEl = null;
  #countEl = null;

  connectedCallback() {
    this.#itemsEl = document.getElementById("todo-items");
    this.#countEl = document.getElementById("todo-count");
  }

  get todos() { return this.#todos; }

  summary() {
    if (this.#todos.length === 0) return "No tasks.";
    return this.#todos.map(t => `${t.done ? "[x]" : "[ ]"} ${t.text}`).join("\n");
  }

  addTodo({ text }) {
    this.#todos.push({ text, done: false });
    this.#render();
    document.dispatchEvent(new CustomEvent("sfx-play", { detail: { sound: "add" } }));
    return { success: true, todos: this.summary() };
  }

  completeTodo({ text }) {
    const lower = text.toLowerCase();
    const item = this.#todos.find(t => !t.done && t.text.toLowerCase().includes(lower));
    if (!item) return { error: `No pending todo matching "${text}"` };
    item.done = true;
    this.#render();
    document.dispatchEvent(new CustomEvent("sfx-play", { detail: { sound: "complete" } }));
    return { success: true, completed: item.text, todos: this.summary() };
  }

  removeTodo({ text }) {
    const lower = text.toLowerCase();
    const idx = this.#todos.findIndex(t => t.text.toLowerCase().includes(lower));
    if (idx === -1) return { error: `No todo matching "${text}"` };
    const removed = this.#todos.splice(idx, 1)[0];
    this.#render();
    return { success: true, removed: removed.text, todos: this.summary() };
  }

  #render() {
    const esc = window.__escapeHtml;
    this.#itemsEl.innerHTML = "";
    let pending = 0;
    this.#todos.forEach(t => {
      if (!t.done) pending++;
      const div = document.createElement("div");
      div.className = `todo-item${t.done ? " done" : ""}`;
      div.innerHTML = `<span class="todo-check">${t.done ? "\u2713" : ""}</span><span class="todo-text">${esc(t.text)}</span>`;
      this.#itemsEl.appendChild(div);
    });
    this.#countEl.textContent = pending > 0 ? pending : this.#todos.length > 0 ? "\u2713" : "0";
  }
}
customElements.define("todo-list", TodoList);

// =========================================================================
// <coach-chat> : Chat log, message rendering, user input, selection context
//
// Methods:
//   addMessage(role, text)
//   addContextMessage(rawMessage, hasErrors)
//   addToolCallMessage(name, args)
// Events dispatched on document:
//   "user-send"           – detail: { message, displayText }
//   "user-screenshot"     – detail: { userMessage }
// =========================================================================
class CoachChat extends HTMLElement {
  #chatLog = null;
  #userInput = null;

  connectedCallback() {
    this.#chatLog = document.getElementById("chat-log");
    this.#userInput = document.getElementById("user-input");

    const sendBtn = document.getElementById("send-btn");
    sendBtn.addEventListener("click", () => this.#handleSend());
    this.#userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); this.#handleSend(); }
    });

    // Screenshot button
    document.getElementById("screenshot-btn").addEventListener("click", () => {
      document.dispatchEvent(new CustomEvent("user-screenshot", {
        detail: { userMessage: "Here's what the game looks like right now. What do you think?" }
      }));
    });

    // Selection hint
    document.addEventListener("selection-changed", (e) => {
      const hint = document.getElementById("selection-hint");
      const sel = e.detail;
      if (sel) {
        hint.textContent = sel.startLine === sel.endLine
          ? `L${sel.startLine} selected`
          : `L${sel.startLine}-${sel.endLine} selected`;
      } else {
        hint.textContent = "";
      }
    });
  }

  /** Programmatically set input text and send (used by STT). */
  sendText(text) {
    this.#userInput.value = text;
    this.#handleSend();
  }

  addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const esc = window.__escapeHtml;
    const marked = window.__marked;
    if (role === "coach") {
      let rendered;
      try { rendered = marked.parse(text, { breaks: true, gfm: true }); }
      catch { rendered = esc(text); }
      div.innerHTML = `<div class="label">Coach</div>${rendered}`;
    } else if (role === "user") {
      div.innerHTML = `<div class="label">You</div>${esc(text)}`;
    } else {
      div.textContent = text;
    }
    this.#chatLog.appendChild(div);
    this.#chatLog.scrollTop = this.#chatLog.scrollHeight;
  }

  addContextMessage(rawMessage, hasErrors) {
    const esc = window.__escapeHtml;
    const lines = rawMessage.split("\n");
    const diffLine = lines.find(l => l.startsWith("AST diff:")) || "";
    const badge = hasErrors
      ? '<span class="ctx-badge err">ERROR</span>'
      : '<span class="ctx-badge ok">OK</span>';
    const summaryText = diffLine.replace("AST diff: ", "").slice(0, 80);

    const div = document.createElement("div");
    div.className = "msg context";
    div.innerHTML = `<details>
      <summary>${badge} ${esc(summaryText)}${summaryText.length >= 80 ? "..." : ""}</summary>
      <pre>${esc(rawMessage)}</pre>
    </details>`;
    this.#chatLog.appendChild(div);
    this.#chatLog.scrollTop = this.#chatLog.scrollHeight;
  }

  addToolCallMessage(name, args) {
    const div = document.createElement("div");
    div.className = "msg toolcall";
    const summary = Object.entries(args || {})
      .filter(([k]) => k !== "newText")
      .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
      .join(", ");
    div.textContent = `tool: ${name}(${summary})`;
    this.#chatLog.appendChild(div);
    this.#chatLog.scrollTop = this.#chatLog.scrollHeight;
  }

  #handleSend() {
    const text = this.#userInput.value.trim();
    if (!text) return;
    this.#userInput.value = "";

    const editor = document.querySelector("code-editor");
    const sel = editor?.getSelection();
    let messageToCoach = "";
    let displayText = text;

    if (sel) {
      const numbered = sel.text.split("\n").map((line, i) => `${sel.startLine + i}: ${line}`).join("\n");
      messageToCoach = `[Student selected lines ${sel.startLine}-${sel.endLine} (1-indexed)]\n`;
      messageToCoach += `Selected code:\n\`\`\`\n${numbered}\n\`\`\`\n\n`;
      messageToCoach += `Student says: ${text}`;
      displayText = `[L${sel.startLine}-${sel.endLine}] ${text}`;
    } else {
      messageToCoach = `Student says: ${text}`;
    }

    this.addMessage("user", displayText);
    document.dispatchEvent(new CustomEvent("user-send", { detail: { message: messageToCoach, displayText } }));
  }
}
customElements.define("coach-chat", CoachChat);

// =========================================================================
// <speech-io> : Browser TTS + push-to-talk STT
//
// Attributes: tts-mode ("off" | "browser")
// Methods:
//   speak(text)
// Listens: "speak" on document (detail: { text })
// Events dispatched on document:
//   "transcript"           – detail: { text } (from STT)
// =========================================================================
class SpeechIO extends HTMLElement {
  #ttsMode = "off";
  #ttsVoice = null;
  #recognition = null;
  #listening = false;
  #captionsEnabled = true;
  #captionOverlay = null;

  connectedCallback() {
    this.#ttsMode = localStorage.getItem("CODE_COACH_TTS_MODE") || "off";
    this.#captionsEnabled = localStorage.getItem("CODE_COACH_CAPTIONS") !== "false";
    this.#captionOverlay = document.getElementById("caption-overlay");

    // TTS mode selector
    const ttsSelect = document.getElementById("tts-select");
    ttsSelect.value = this.#ttsMode;
    ttsSelect.addEventListener("change", () => {
      this.#ttsMode = ttsSelect.value;
      localStorage.setItem("CODE_COACH_TTS_MODE", this.#ttsMode);
      if (this.#ttsMode !== "browser") speechSynthesis.cancel();
    });

    // Captions toggle
    const captionsBtn = document.getElementById("captions-btn");
    this.#updateCaptionsBtn(captionsBtn);
    captionsBtn.addEventListener("click", () => {
      this.#captionsEnabled = !this.#captionsEnabled;
      localStorage.setItem("CODE_COACH_CAPTIONS", this.#captionsEnabled);
      this.#updateCaptionsBtn(captionsBtn);
      if (!this.#captionsEnabled) this.#captionOverlay.classList.remove("visible");
    });

    // Voice selection
    speechSynthesis.addEventListener("voiceschanged", () => this.#pickVoice());

    // Listen for speak events
    document.addEventListener("speak", (e) => this.speak(e.detail.text));

    // Init STT
    this.#initSTT();
  }

  speak(text) {
    if (this.#captionsEnabled) {
      this.#captionOverlay.textContent = text;
      this.#captionOverlay.classList.add("visible");
      const readTime = Math.max(3000, text.length * 50);
      setTimeout(() => this.#captionOverlay.classList.remove("visible"), readTime);
    }
    if (this.#ttsMode === "browser") this.#browserTTS(text);
  }

  #browserTTS(text) {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const voice = this.#pickVoice();
    if (voice) utter.voice = voice;
    utter.rate = 1.05;
    utter.pitch = 1.0;
    speechSynthesis.speak(utter);
  }

  #pickVoice() {
    if (this.#ttsVoice) return this.#ttsVoice;
    const voices = speechSynthesis.getVoices();
    this.#ttsVoice =
      voices.find(v => v.name.includes("Samantha")) ||
      voices.find(v => v.lang.startsWith("en") && v.name.includes("Natural")) ||
      voices.find(v => v.lang.startsWith("en-US")) ||
      voices.find(v => v.lang.startsWith("en")) ||
      voices[0];
    return this.#ttsVoice;
  }

  #updateCaptionsBtn(btn) {
    btn.textContent = `Captions: ${this.#captionsEnabled ? "On" : "Off"}`;
    btn.classList.toggle("active", this.#captionsEnabled);
  }

  #initSTT() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById("mic-btn");
    const userInput = document.getElementById("user-input");

    if (!SpeechRecognition) {
      micBtn.title = "Speech recognition not supported in this browser";
      micBtn.disabled = true;
      return;
    }

    this.#recognition = new SpeechRecognition();
    this.#recognition.continuous = false;
    this.#recognition.interimResults = false;
    this.#recognition.lang = "en-US";

    this.#recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      document.dispatchEvent(new CustomEvent("transcript", { detail: { text: transcript } }));
    };

    this.#recognition.onend = () => { this.#listening = false; micBtn.classList.remove("listening"); };
    this.#recognition.onerror = () => { this.#listening = false; micBtn.classList.remove("listening"); };

    micBtn.addEventListener("click", () => this.#toggleMic(micBtn));

    // Space push-to-talk
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && document.activeElement !== userInput &&
          !document.activeElement?.closest("#monaco-container")) {
        e.preventDefault();
        if (!this.#listening) this.#startMic(micBtn);
      }
    });
    document.addEventListener("keyup", (e) => {
      if (e.code === "Space" && this.#listening && document.activeElement !== userInput) {
        this.#stopMic(micBtn);
      }
    });
  }

  #toggleMic(btn) { if (this.#listening) this.#stopMic(btn); else this.#startMic(btn); }

  #startMic(btn) {
    if (!this.#recognition || this.#listening) return;
    speechSynthesis.cancel();
    this.#listening = true;
    btn.classList.add("listening");
    this.#recognition.start();
  }

  #stopMic(btn) {
    if (!this.#recognition || !this.#listening) return;
    this.#recognition.stop();
  }
}

// <coach-agent> : OpenAI-compatible LLM with tool-calling loop
//
// Attributes: api-base, model, api-key-name (localStorage key for Bearer token)
// Methods:
//   async send(content)        – content is string or array (for multimodal)
//   async submitToolResults(results) – array of {tool_call_id, content}
//   get ready                  – boolean
// Events dispatched on document:
//   "agent-ready"              – after init
//   "agent-response"           – detail: { text }
//   "agent-error"              – detail: { error }
//   "agent-tool-calls"         – detail: { calls: [{id, name, arguments}], resolve }
//     The orchestrator must call resolve(results) where results is
//     [{tool_call_id, content: string}...] to continue the loop.
// =========================================================================
class CoachAgent extends HTMLElement {
  #apiBase = "";
  #model = "";
  #apiKey = "";
  #messages = [];   // OpenAI-format message history
  #systemPrompt = "";
  #tools = [];      // OpenAI-format tool definitions
  #ready = false;
  #responding = false;

  // ---- Tool declarations (OpenAI JSON Schema format) ----
  static TOOL_DEFS = [
    {
      type: "function",
      function: {
        name: "edit_code",
        description: "Replace a range of lines in the editor with new text. Use to fix bugs, insert code, or delete lines. Line numbers are 1-indexed. To insert without replacing, set startLine and endLine to the same line. To delete lines, set newText to empty string.",
        parameters: {
          type: "object",
          properties: {
            startLine: { type: "number", description: "First line of range to replace (1-indexed)" },
            endLine: { type: "number", description: "Last line of range to replace (1-indexed, inclusive)" },
            newText: { type: "string", description: "Replacement text (can be multiple lines, or empty to delete)" }
          },
          required: ["startLine", "endLine", "newText"]
        }
      }
    },
    {
      type: "function",
      function: {
        name: "highlight_lines",
        description: "Highlight a span of lines in the editor and attach a rich annotation comment visible inline. Use to call attention to a specific section: a bug, a pattern worth noting, or a place that needs work. The annotation supports HTML including links. Only one highlight can be active at a time (previous is cleared).",
        parameters: {
          type: "object",
          properties: {
            startLine: { type: "number", description: "First line to highlight (1-indexed)" },
            endLine: { type: "number", description: "Last line to highlight (1-indexed, inclusive)" },
            message: { type: "string", description: "Short annotation text (plain text, 1-2 sentences)" },
            linkUrl: { type: "string", description: "Optional documentation URL to include in the annotation" },
            linkLabel: { type: "string", description: "Label for the link (defaults to 'docs')" }
          },
          required: ["startLine", "endLine", "message"]
        }
      }
    },
    {
      type: "function",
      function: {
        name: "clear_highlights",
        description: "Remove all active highlights and annotations from the editor.",
        parameters: { type: "object", properties: {} }
      }
    },
    {
      type: "function",
      function: {
        name: "get_code",
        description: "Get the current full source code from the editor. Use when you need to read the code outside of an automatic update.",
        parameters: { type: "object", properties: {} }
      }
    },
    {
      type: "function",
      function: {
        name: "suggest_fix",
        description: "Propose a small quick-fix inline in the editor. Shows a widget with Apply and Dismiss buttons on the affected line. Use for typos, misspellings, casing fixes, small one-line corrections. The student clicks Apply to accept (no chat needed) or Dismiss to reject. You will be notified of the outcome. Do NOT use for large refactors.",
        parameters: {
          type: "object",
          properties: {
            line: { type: "number", description: "The line number to attach the fix to (1-indexed)" },
            oldText: { type: "string", description: "The exact text to find and replace on that line" },
            newText: { type: "string", description: "The replacement text" },
            message: { type: "string", description: "Short description of the fix (e.g. 'typo: plyrHelth -> playerHealth')" }
          },
          required: ["line", "oldText", "newText", "message"]
        }
      }
    },
    {
      type: "function",
      function: {
        name: "add_todo",
        description: "Add a task to the student's todo list. Use to suggest next steps, track what needs doing, or break down a larger goal. The coach maintains this list automatically as the student codes.",
        parameters: {
          type: "object",
          properties: {

    {
      type: "function",
      function: {
        name: "complete_todo",
        description: "Mark a todo item as done. Use when you observe the student has completed something on the list. Pass the exact text or a unique substring of the task to match it.",
        parameters: {

          properties: {

          required: ["text"]

    },
    {
      type: "function",
      function: {
        name: "remove_todo",
        description: "Remove a todo item entirely. Use when a task is no longer relevant.",
        parameters: {
          type: "object",
          properties: {
            text: { type: "string", description: "The task text (or substring) to remove" }
          },
          required: ["text"]
        }
      }
    },
    {
      type: "function",
      function: {
        name: "run_preview",
        description: "Run the student's code in the game preview iframe. Loads the current editor code with the Phaser 4 CDN and executes it. Returns any console output (logs, warnings, errors) from the run. Use when: the student asks to run, you want to test if their code works, or you notice they have not run in a while after significant changes.",
        parameters: { type: "object", properties: {} }
      }
    },
    {
      type: "function",
      function: {
        name: "screenshot_preview",
        description: "Capture a screenshot of the game preview canvas. You will receive the image as a follow-up so you can see what the game looks like. Use to check visual output, verify sprites are rendering, or when the student asks 'how does it look'. The game must be running first.",
        parameters: { type: "object", properties: {} }
      }
    }
  ];

  get ready() { return this.#ready; }
  get responding() { return this.#responding; }

  connectedCallback() {
    this.#apiBase = this.getAttribute("api-base") || "https://api.bayleaf.dev/v1";
    this.#model = this.getAttribute("model") || "qwen/qwen3.5-35b-a3b";
    const keyName = this.getAttribute("api-key-name") || "BAYLEAF_API_KEY";
    this.#apiKey = localStorage.getItem(keyName) || "";
    this.#tools = CoachAgent.TOOL_DEFS;
  }

  /** Set the system prompt (must be called before first send). */
  setSystemPrompt(prompt) {
    this.#systemPrompt = prompt;
    this.#messages = [{ role: "system", content: prompt }];
    this.#ready = true;
    document.dispatchEvent(new CustomEvent("agent-ready"));
  }

  /**
   * Send a message to the agent. Content can be:
   *   - a string (plain text user message)
   *   - an array of OpenAI content parts (for multimodal, e.g. image_url + text)
   * Returns the final text response (or null).
   */
  async send(content) {
    if (!this.#ready) return null;
    this.#responding = true;

    // Build the user message
    const userMsg = typeof content === "string"
      ? { role: "user", content }
      : { role: "user", content };  // array content parts are valid OpenAI format
    this.#messages.push(userMsg);

    try {
      return await this.#completionLoop();
    } catch (err) {
      console.error("Agent error:", err);
      document.dispatchEvent(new CustomEvent("agent-error", { detail: { error: err.message } }));
      return null;
    } finally {
      this.#responding = false;
    }
  }

  /** Continue after tool results have been submitted. */
  async submitToolResults(results) {
    // results: [{tool_call_id, content}...]
    for (const r of results) {
      this.#messages.push({
        role: "tool",
        tool_call_id: r.tool_call_id,
        content: typeof r.content === "string" ? r.content : JSON.stringify(r.content),
      });
    }
    return this.#completionLoop();
  }

  async #completionLoop() {
    let guard = 0;
    while (guard++ < 10) {
      const body = {
        model: this.#model,
        messages: this.#messages,
        tools: this.#tools,
        temperature: 0.8,
        max_tokens: 1024,
      };

      const headers = { "Content-Type": "application/json" };
      if (this.#apiKey) headers["Authorization"] = `Bearer ${this.#apiKey}`;

      const res = await fetch(`${this.#apiBase}/chat/completions`, {
        method: "POST",
        headers,
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`API ${res.status}: ${errText.slice(0, 200)}`);
      }

      const data = await res.json();
      const choice = data.choices?.[0];
      if (!choice) throw new Error("No choices in response");

      const msg = choice.message;

      // Append assistant message to history
      this.#messages.push(msg);

      // Check for tool calls
      if (msg.tool_calls && msg.tool_calls.length > 0) {
        // Dispatch to orchestrator and wait for results
        const toolResults = await new Promise((resolve) => {
          document.dispatchEvent(new CustomEvent("agent-tool-calls", {
            detail: {
              calls: msg.tool_calls.map(tc => ({
                id: tc.id,
                name: tc.function.name,
                arguments: JSON.parse(tc.function.arguments),
              })),
              resolve,
            }
          }));
        });

        // Push tool results into history and loop
        for (const r of toolResults) {
          this.#messages.push({
            role: "tool",
            tool_call_id: r.tool_call_id,
            content: typeof r.content === "string" ? r.content : JSON.stringify(r.content),
          });
        }
        continue; // next iteration of completion loop
      }

      // No tool calls: we have a final text response
      const text = msg.content?.trim() || null;
      if (text) {
        document.dispatchEvent(new CustomEvent("agent-response", { detail: { text } }));
      }
      return text;
    }

    // Guard exceeded
    console.warn("Agent tool-calling loop exceeded 10 iterations");
    return null;
  }
}

// <sfx-engine> : WebAudio synth feedback sounds
//
// Listens: "sfx-play" on document (detail: { sound: "add"|"complete" })
// Attribute: enabled (boolean, toggles via sfx-btn)
// =========================================================================
class SfxEngine extends HTMLElement {
  #ctx = null;
  #enabled = true;

  connectedCallback() {
    this.#enabled = localStorage.getItem("CODE_COACH_SFX") !== "false";
    const btn = document.getElementById("sfx-btn");
    this.#updateBtn(btn);
    btn.addEventListener("click", () => {
      this.#enabled = !this.#enabled;
      localStorage.setItem("CODE_COACH_SFX", this.#enabled);
      this.#updateBtn(btn);
    });
    document.addEventListener("sfx-play", (e) => this.#play(e.detail.sound));
  }

  #updateBtn(btn) {
    btn.textContent = `SFX: ${this.#enabled ? "On" : "Off"}`;
    btn.classList.toggle("active", this.#enabled);
  }

  #getCtx() {
    if (!this.#ctx) this.#ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this.#ctx;
  }

  // Expose for components that need raw AudioContext (e.g. TTS playback)
  get audioContext() { return this.#getCtx(); }

  #play(sound) {
    if (!this.#enabled) return;
    if (sound === "add") this.#playAdd();
    else if (sound === "complete") this.#playComplete();
  }

  #playAdd() {
    const ctx = this.#getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  }

  #playComplete() {
    const ctx = this.#getCtx();
    [0, 0.1].forEach((offset, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(i === 0 ? 660 : 990, ctx.currentTime + offset);
      gain.gain.setValueAtTime(0.15, ctx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.25);
    });
  }
}

// <particle-fx> : Canvas overlay particle system
//
// Listens: "particles-spawn" on document (detail: { x, y, count? })
// Uses the #particle-canvas element in the DOM.
// =========================================================================
class ParticleFx extends HTMLElement {
  #canvas = null;
  #ctx = null;
  #particles = [];
  #animId = null;

  connectedCallback() {
    this.#canvas = document.getElementById("particle-canvas");
    this.#ctx = this.#canvas.getContext("2d");
    this.#resize();
    window.addEventListener("resize", () => this.#resize());
    document.addEventListener("particles-spawn", (e) => {
      this.spawn(e.detail.x, e.detail.y, e.detail.count || 12);
    });
  }

  #resize() {
    this.#canvas.width = window.innerWidth;
    this.#canvas.height = window.innerHeight;
  }

  spawn(x, y, count = 12) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = 40 + Math.random() * 60;
      const size = 2 + Math.random() * 3;
      const hue = 210 + Math.random() * 30;
      this.#particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 20,
        size, life: 1.0,
        decay: 0.02 + Math.random() * 0.02,
        color: `hsla(${hue}, 70%, 65%,`,
      });
    }
    if (!this.#animId) this.#tick();
  }

  #tick() {
    this.#ctx.clearRect(0, 0, this.#canvas.width, this.#canvas.height);
    for (let i = this.#particles.length - 1; i >= 0; i--) {
      const p = this.#particles[i];
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;
      p.vy += 80 * 0.016;
      p.life -= p.decay;
      if (p.life <= 0) { this.#particles.splice(i, 1); continue; }
      this.#ctx.beginPath();
      this.#ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      this.#ctx.fillStyle = p.color + p.life + ")";
      this.#ctx.fill();
    }
    if (this.#particles.length > 0) {
      this.#animId = requestAnimationFrame(() => this.#tick());
    } else {
      this.#animId = null;
    }
  }
}

// Boot Orchestrator
//
// Wires all custom elements together via events and direct method calls.

const SYSTEM_PROMPT = `HARD RULE: Every text response must be 15 words or fewer. Spoken aloud by TTS. No exceptions.

# Interaction Model
This is a point-and-talk interface. The code editor is the shared workspace.

The student communicates by: selecting code spans + speaking or typing a short message. When the student sends a message, you may receive their current selection (lines and code). The selection is what they are pointing at.

You communicate by: speaking short sentences (your text responses) + pointing at code with highlight_lines. Your annotations in the editor ARE your primary visual output. Use them freely.

# Your Role
Back-seat programmer watching a student build a Phaser 4 game.

On automatic code updates: mostly nod along. Name what changed or flag a bug. Often just "Mhm." or nothing.

When the student selects code and asks about it: use highlight_lines to annotate the relevant span, then speak your answer.

When the student asks you to change code: use judgment about consent. If the request is an explicit instruction ("switch to a class", "refactor this", "fix that bug"), that IS consent, just do it with get_code then edit_code. If you are initiating the change yourself (you noticed a problem and want to fix it), then highlight first and ask before editing.

When the student dismisses an annotation: they have seen it. Acknowledge briefly or stay silent.

# Tools
Your tools act on the shared editor workspace.

highlight_lines: Your primary output tool. Point at code, annotate it. The annotation appears as subtle trailing text on the line. Use this constantly: to answer questions, flag issues, propose changes, or just to point. The student can dismiss annotations by clicking the X in the gutter.

suggest_fix: Your quick-fix tool. For small, obvious corrections: typos in identifiers, casing fixes, misspellings, missing semicolons. Shows an inline widget with Apply and Dismiss buttons right on the line. The student clicks Apply (one click, no chat) or Dismiss. You get notified either way. Use this instead of edit_code for anything that is a one-spot text replacement on a single line.

edit_code: For larger changes spanning multiple lines. If the student asked for the change, just do it. If you are initiating, highlight first and ask. Always get_code before editing.

clear_highlights: Clean up before placing new ones.

get_code: Read the current source. Use on first turn and before any edit.

run_preview: Run the student's code in the game preview iframe. Loads Phaser 4 from CDN and executes their code. Returns console output. IMPORTANT: Do NOT auto-run. Only use when the student asks to run, or when you want to suggest they try running. If you initiate it, say something like "Want to try running it?" first. The student can also run manually with the Run button or Ctrl+Enter. You see console output in code updates, so you can comment on runtime errors.

screenshot_preview: Capture a screenshot of the game canvas. You will receive the image as a follow-up message. Use to check visual output after a run. The student can also send you a screenshot manually via the Screenshot button. When you receive a screenshot, briefly comment on what you see (sprites, colors, layout) in 15 words or fewer.

# Phaser 4 Knowledge
Phaser 4.0.0 "Caladan" was released April 10, 2026. Key changes from v3:
- Pipelines replaced by Render Nodes (node-based renderer, each node handles one task)
- FX and Masks unified into a single Filter system (Blur, Glow, Shadow, Pixelate, ColorMatrix, Bloom, Vignette, etc.)
- SpriteGPULayer for rendering millions of sprites in one draw call
- TilemapGPULayer renders entire tilemap layer as single quad
- Overhauled Tint system: six modes (MULTIPLY, FILL, ADD, SCREEN, OVERLAY, HARD_LIGHT)
- New game objects: Gradient, Noise, CaptureFrame, Stamp
- Simplified lighting: \`sprite.setLighting(true)\`
- Canvas renderer deprecated (WebGL is primary)
- \`Phaser.Struct.Set\` replaced with native JS Set
- \`Point\` replaced by \`Vector2\`
- \`roundPixels\` defaults to false now
- Mesh and Plane game objects removed
- GL orientation used natively (Y=0 at bottom for textures)

The core API (Game, Scene lifecycle, Arcade Physics, input, tweens, timers, audio) remains largely the same as v3. Most tutorials and patterns still apply. The big changes are renderer internals and the Filter system.

# Phaser Docs Links
The official Phaser 4 docs are at https://docs.phaser.io. The API docs use this URL pattern:

  https://docs.phaser.io/api-documentation/class/{namespace}-{classname}#{method}

IMPORTANT: the hash fragment is always LOWERCASE, even if the actual API uses camelCase. Examples:
- GameObjects.GameObjectFactory.rectangle -> https://docs.phaser.io/api-documentation/class/gameobjects-gameobjectfactory#rectangle
- Physics.Arcade.Factory.sprite -> https://docs.phaser.io/api-documentation/class/physics-arcade-factory#sprite
- Scene lifecycle (preload, create, update) -> https://docs.phaser.io/api-documentation/class/scene
- Input.Keyboard.KeyboardPlugin.createCursorKeys -> https://docs.phaser.io/api-documentation/class/input-keyboard-keyboardplugin#createcursorkeys
- Tweens.TweenManager.add -> https://docs.phaser.io/api-documentation/class/tweens-tweenmanager#add

# Todo List
You have a todo list you maintain for the student. Use it to track what they are building toward.

add_todo: Add a task when you see a clear next step or when the student mentions a goal. Keep tasks short and concrete ("Add player sprite in create", "Set up keyboard input", "Add collision with enemies"). Add 2-3 starter tasks on the first turn based on what you see in the code.

complete_todo: Mark a task done when the student's code now clearly accomplishes it. Do this silently during automatic code updates. You see the todo list in every update, so check if any pending items are now done. Do not announce completions, just complete them.

remove_todo: Remove a task if it becomes irrelevant (e.g. the student changed direction).

The todo list is visible in the UI. The student hears a sound when items are added or completed.

# Cursor Awareness and Doc Links
You receive the student's cursor line in every code update. When the cursor is on or near a Phaser API call, consider using highlight_lines with a linkUrl to the relevant docs page. Do not do this on every update, only when the student is working on a new API they might not know well, or when they pause on something. One doc link per session point is enough, do not spam.

# Syntax Errors
When the code has a parse error, just say where and what, like "Looks like a missing closing brace around line 12."

# First Turn
Say hi briefly. Something like "I'm here, watching. Start building and I'll follow along." Keep it to one sentence.

# Naming and Style
Pay attention to identifier names. If you notice inconsistent casing (mixing camelCase and snake_case), misspellings, or unclear names, mention it. Good naming is part of good code. Examples: "playerSpd is a bit cryptic, maybe playerSpeed?" or "You are mixing camelCase and snake_case."

# Examples of Good Responses
- "Setting up the game config, nice."
- "Adding cursor keys in create, yep."
- "Heads up, you are loading that image in update, it should be in preload."
- "Missing a closing paren on line 8."
- "plyrHelth is hard to read, maybe playerHealth?"
- (silence, because the change was just adding a comment)

# Anti-Patterns
- Do not dump the AST back at the student
- Do not repeat their code back to them
- Do not give tutorials or explain concepts unless asked
- Do not suggest what to build next
- Do not praise every edit
- Do not say "Great job!" or "Looking good!" unless something genuinely impressive happened
- Do not ask questions unless you are truly confused about intent`;

async function boot() {
  // Grab component references
  const agent     = document.querySelector("coach-agent");
  const editor    = document.querySelector("code-editor");

  const preview   = document.querySelector("game-preview");

  chat.addMessage("system", "Loading editor and language parser...");

  // Init Monaco and tree-sitter in parallel

  // Wire watcher to editor
  watcher.setEditor(editor);

  // Show auth status
  const hasKey = !!localStorage.getItem("BAYLEAF_API_KEY");
  if (hasKey) {
    chat.addMessage("system", "Editor ready. Connecting to coach (BayLeaf API key)...");
  } else {
    chat.addMessage("system", "Editor ready. Connecting to coach (campus network, no key)...");
    chat.addMessage("system", "Off campus? Run in console: localStorage.setItem('BAYLEAF_API_KEY', 'sk-bayleaf-...')  — get a free key at api.bayleaf.dev");
  }

  // AST status indicator
  const astStatus = document.getElementById("ast-status");
  document.addEventListener("ast-status", (e) => {
    astStatus.className = e.detail.cls;
    astStatus.textContent = e.detail.text;
  });

  // ---- Tool dispatch ----
  // Maps tool names to handler functions. Each returns a result object.
  const toolHandlers = {
    edit_code: (args) => {
      const result = editor.editCode(args);
      watcher.resetTracking();
      return result;
    },
    highlight_lines: (args) => editor.highlightLines(args),
    clear_highlights: () => editor.clearHighlights(),
    get_code: () => editor.getCode(),
    suggest_fix: (args) => editor.suggestFix(args),
    add_todo: (args) => todoList.addTodo(args),
    complete_todo: (args) => todoList.completeTodo(args),
    remove_todo: (args) => todoList.removeTodo(args),
    run_preview: () => {
      const result = preview.run(editor.getValue());
      requestAnimationFrame(() => {
        const btn = document.getElementById("run-btn");
        if (btn) {
          const rect = btn.getBoundingClientRect();
          document.dispatchEvent(new CustomEvent("particles-spawn", {
            detail: { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2, count: 16 }
          }));
        }
      });
      return result;
    },
    screenshot_preview: async () => {
      const result = await preview.captureScreenshot();
      if (result.error) return result;
      // Send image + console as follow-up so the model sees both
      setTimeout(async () => {
        const base64 = preview.lastScreenshotBase64;
        if (base64) {
          let caption = "[Screenshot from your screenshot_preview tool. Describe exactly what you see: colors, shapes, positions.]";
          const consoleSnap = preview.getConsoleSnapshot();
          if (consoleSnap !== "No console output.") {
            caption += `\n\nRecent console output:\n${consoleSnap}`;
          }
          await sendToAgent([
            { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } },
            { type: "text", text: caption }
          ]);
        }
      }, 100);
      return { success: true, note: "Screenshot captured. You will receive the image momentarily." };
    },
  };

  // Handle tool calls from the agent
  document.addEventListener("agent-tool-calls", async (e) => {
    const { calls, resolve } = e.detail;
    const results = [];
    for (const call of calls) {
      chat.addToolCallMessage(call.name, call.arguments);
      let result;
      try {
        const handler = toolHandlers[call.name];
        if (!handler) throw new Error(`Unknown tool: ${call.name}`);
        result = await handler(call.arguments);
      } catch (err) {
        result = { error: err.message };
      }
      results.push({
        tool_call_id: call.id,
        content: typeof result === "string" ? result : JSON.stringify(result),
      });
    }
    resolve(results);
  });

  // Handle agent text responses
  document.addEventListener("agent-response", (e) => {
    chat.addMessage("coach", e.detail.text);
    document.dispatchEvent(new CustomEvent("speak", { detail: { text: e.detail.text } }));
  });

  document.addEventListener("agent-error", (e) => {
    chat.addMessage("system", `Coach error: ${e.detail.error}`);
  });

  // ---- Send helpers ----
  async function sendToAgent(content) {
    watcher.setCoachResponding(true);
    await agent.send(content);
    // responding flag cleared by watcher listening to agent-response / agent-error
  }

  // Code context from AST watcher (automatic updates)
  document.addEventListener("code-context", async (e) => {
    const { message, hasErrors } = e.detail;

    // Append todo state
    let fullMessage = message;
    if (todoList.todos.length > 0) {
      fullMessage += `\n\nTodo list:\n${todoList.summary()}`;
    }
    const consoleSnap = preview.getConsoleSnapshot();
    if (consoleSnap !== "No console output.") {
      fullMessage += `\n\nRecent console output:\n${consoleSnap}`;
    }

    chat.addContextMessage(fullMessage, hasErrors);
    await sendToAgent(fullMessage);
  });

  // User text input
  document.addEventListener("user-send", async (e) => {
    await sendToAgent(e.detail.message);
  });

  // User screenshot button (bundles console output alongside the image)
  document.addEventListener("user-screenshot", async (e) => {
    const result = await preview.captureScreenshot();
    if (result.error) { chat.addMessage("system", result.error); return; }
    const base64 = preview.lastScreenshotBase64;
    const userMsg = e.detail.userMessage;
    chat.addMessage("user", userMsg || "[Sent screenshot]");
    let caption = userMsg || "[Screenshot of the game preview. Describe exactly what you see: colors, shapes, positions.]";
    const consoleSnap = preview.getConsoleSnapshot();
    if (consoleSnap !== "No console output.") {
      caption += `\n\nRecent console output:\n${consoleSnap}`;
    }
    await sendToAgent([
      { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } },
      { type: "text", text: caption }
    ]);
  });

  // Share logs button: send console output to agent on demand
  document.getElementById("share-logs-btn").addEventListener("click", async () => {
    const consoleSnap = preview.getConsoleSnapshot();
    if (consoleSnap === "No console output.") {
      chat.addMessage("system", "No console output to share.");
      return;
    }
    chat.addMessage("user", "[Shared console logs]");
    await sendToAgent(`[Student shared console logs]\n\n${consoleSnap}`);
  });

  // Annotation dismissed
  document.addEventListener("annotation-dismissed", async (e) => {
    const d = e.detail;
    await sendToAgent(`[The student dismissed your annotation on lines ${d.startLine}-${d.endLine}: "${d.message}"]`);
  });

  // Quick-fix outcomes
  document.addEventListener("quickfix-applied", async (e) => {
    const d = e.detail;
    if (d.error) {
      await sendToAgent(`[Quick-fix "${d.message}" could not be applied: ${d.error}]`);
    } else {
      watcher.resetTracking();
      await sendToAgent(`[Student applied quick-fix on line ${d.line}: "${d.message}"]`);
    }
  });
  document.addEventListener("quickfix-dismissed", async (e) => {
    await sendToAgent(`[Student dismissed quick-fix on line ${e.detail.line}: "${e.detail.message}"]`);
  });

  // STT transcript -> chat input
  document.addEventListener("transcript", (e) => {
    chat.sendText(e.detail.text);
  });

  // ---- Initialize agent and start ----
  agent.setSystemPrompt(SYSTEM_PROMPT);

  // Start polling and send first turn
  watcher.startPolling();
  await sendToAgent("The student has just opened the editor. Use get_code to see what they have, then say hi briefly.");
}

boot().catch((err) => {
  console.error("Boot failed:", err);
  const chat = document.querySelector("coach-chat");
  if (chat) chat.addMessage("system", `Failed to initialize: ${err.message}`);
});

</script>
</body>
</html>
