<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SFX Soundboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e1e1e; color: #d4d4d4;
    padding: 24px; max-width: 900px; margin: 0 auto;
  }
  h1 { color: #569cd6; font-size: 18px; margin-bottom: 4px; }
  p.sub { color: #888; font-size: 13px; margin-bottom: 24px; }
  h2 { color: #6a9955; font-size: 15px; margin-bottom: 12px; }
  .section { margin-bottom: 32px; }
  .grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .sound-btn {
    background: #2d2d2d; border: 1px solid #444; color: #d4d4d4;
    padding: 12px 8px; border-radius: 6px; cursor: pointer;
    font-size: 13px; text-align: center; transition: all 0.15s;
  }
  .sound-btn:hover { background: #383838; border-color: #666; }
  .sound-btn:active { background: #444; }
  .sound-btn.selected { border-color: #569cd6; background: #264f78; }
  .sound-btn .num { font-size: 18px; font-weight: 700; display: block; margin-bottom: 4px; }
  .sound-btn .preset { font-size: 10px; color: #888; }
  #output-area {
    margin-top: 24px; padding: 16px; background: #1a1a1a;
    border: 1px solid #333; border-radius: 6px; font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  #output-area h3 { color: #ce9178; font-size: 13px; margin-bottom: 8px; }
  #output-area pre {
    white-space: pre-wrap; word-break: break-all;
    color: #9cdcfe; max-height: 200px; overflow-y: auto;
    user-select: all; cursor: text;
  }
  #output-area .hint { color: #555; font-style: italic; margin-top: 8px; font-size: 11px; }
  .pick-label { color: #888; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>

<h1>Code Coach SFX Soundboard</h1>
<p class="sub">Click to hear each sound. Pick your favorites, then copy the JSON below.</p>

<div class="section">
  <h2>Todo Added (short blip)</h2>
  <div class="grid" id="add-grid"></div>
  <div class="pick-label">Selected: <span id="add-pick">none</span></div>
</div>

<div class="section">
  <h2>Todo Completed (rising sweep)</h2>
  <div class="grid" id="complete-grid"></div>
  <div class="pick-label">Selected: <span id="complete-pick">none</span></div>
</div>

<div id="output-area">
  <h3>Paste this back</h3>
  <pre id="output">Pick a sound from each section above.</pre>
  <div class="hint">Click to select text, then copy.</div>
</div>

<script src="https://sfxr.me/riffwave.js"></script>
<script src="https://sfxr.me/sfxr.js"></script>
<script>
const ADD_PRESETS = ["blipSelect", "pickupCoin", "click"];
const COMPLETE_PRESETS = ["powerUp", "pickupCoin"];

function generateValid(preset) {
  for (let i = 0; i < 200; i++) {
    const s = sfxr.generate(preset);
    const buf = sfxr.toBuffer(s);
    if (buf.length > 50) {
      // verify no non-finite values
      let ok = true;
      for (let j = 0; j < buf.length; j++) {
        if (!isFinite(buf[j])) { ok = false; break; }
      }
      if (ok) return { def: s, preset };
    }
  }
  return null;
}

function buildGrid(containerId, pickId, presets, count, stateKey) {
  const grid = document.getElementById(containerId);
  const pickLabel = document.getElementById(pickId);
  const sounds = [];

  // distribute presets across count slots
  for (let i = 0; i < count; i++) {
    const preset = presets[i % presets.length];
    const result = generateValid(preset);
    if (result) sounds.push(result);
  }

  sounds.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "sound-btn";
    btn.innerHTML = `<span class="num">${i + 1}</span><span class="preset">${s.preset}</span>`;
    btn.addEventListener("click", () => {
      sfxr.play(s.def);
      // mark selected
      grid.querySelectorAll(".sound-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      pickLabel.textContent = `#${i + 1} (${s.preset})`;
      state[stateKey] = s.def;
      updateOutput();
    });
    grid.appendChild(btn);
  });
}

const state = { add: null, complete: null };

function updateOutput() {
  const out = document.getElementById("output");
  if (!state.add && !state.complete) {
    out.textContent = "Pick a sound from each section above.";
    return;
  }
  const obj = {};
  if (state.add) obj.add = state.add;
  if (state.complete) obj.complete = state.complete;
  out.textContent = JSON.stringify(obj, null, 2);
}

buildGrid("add-grid", "add-pick", ADD_PRESETS, 16, "add");
buildGrid("complete-grid", "complete-pick", COMPLETE_PRESETS, 16, "complete");
</script>
</body>
</html>
